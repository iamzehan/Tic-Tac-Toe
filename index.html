<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Press+Start+2P"
      rel="stylesheet"
    />
    <script src="src/script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <title>Tic Tac Toe</title>
    <style></style>
  </head>
  <body>
    <dialog class="result" open>
      <span class="material-symbols-outlined"> </span> Wins
    </dialog>
    
    <div class="info">
      <h4 id="name" class="name"></h4>
      <i id="icon" class="material-symbols-outlined"></i>
    </div>
    <div class="container">
      <div class="row one">
        <div class="col one" data-index="0">
          <i class="material-symbols-outlined"></i>
        </div>
        <div class="col two" data-index="1">
          <i class="material-symbols-outlined"></i>
        </div>
        <div class="col three" data-index="2">
          <i class="material-symbols-outlined"></i>
        </div>
      </div>
      <div class="row one">
        <div class="col one" data-index="3">
          <i class="material-symbols-outlined"></i>
        </div>
        <div class="col two" data-index="4">
          <i class="material-symbols-outlined"></i>
        </div>
        <div class="col three" data-index="5">
          <i class="material-symbols-outlined"></i>
        </div>
      </div>
      <div class="row two">
        <div class="col one" data-index="6">
          <i class="material-symbols-outlined"></i>
        </div>
        <div class="col two" data-index="7">
          <i class="material-symbols-outlined"></i>
        </div>
        <div class="col three" data-index="8">
          <i class="material-symbols-outlined"></i>
        </div>
      </div>
    </div>
    <div class="info">
      <h4 id="name" class="name"></h4>
      <i id="icon" class="material-symbols-outlined"></i>
    </div>

    <div class="landing">
      <div class="logo">
        <span class="material-symbols-outlined"> star </span>
      </div>
      <h2>Tic Tac Toe</h2>
      <form action="" id="form">
        <label for="name">Name:</label>
        <input
          type="text"
          name="name"
          id="input-name"
          placeholder="Your name"
        />
        <label for="symbols">Select Symbol:</label>
        <select name="symbols" id="symbols">
          <option value="x">x</option>
          <option value="o">o</option>
        </select>
        <div class="btn">
          <button class="play" type="submit">
            Play
            <i class="material-symbols-outlined">play_arrow</i>
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
