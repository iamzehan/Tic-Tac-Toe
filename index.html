<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
    <script src="src/script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <title>Tic Tac Toe</title>
    <style></style>
  </head>
  <body>
    <div class="container">
      <div class="row 1">
        <div class="col"><i class="material-symbols-outlined"></i></div>
        <div class="col"><i class="material-symbols-outlined"></i></div>
        <div class="col"><i class="material-symbols-outlined"></i></div>
      </div>
      <div class="row 2">
        <div class="col 1"><i class="material-symbols-outlined"></i></div>
        <div class="col 2"><i class="material-symbols-outlined"></i></div>
        <div class="col 3"><i class="material-symbols-outlined"></i></div>
      </div>
      <div class="row 3">
        <div class="col 1"><i class="material-symbols-outlined"></i></div>
        <div class="col 2"><i class="material-symbols-outlined"></i></div>
        <div class="col 3"><i class="material-symbols-outlined"></i></div>
      </div>
    </div>

    <div class="welcome">
      <div class="logo">
        <span class="material-symbols-outlined"> stadia_controller </span>
      </div>
      <h2>Tic Tac Toe</h2>
      <form action="" id="form">
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" placeholder="Your name" />
        <label for="symbols">Select Symbol:</label>
        <select name="symbols" id="symbols">
          <option value="x">x</option>
          <option value="o">o</option>
        </select>
        <div class="btn">
          <button class="play" type="submit">
            Play
            <i class="material-symbols-outlined">play_arrow</i>
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
